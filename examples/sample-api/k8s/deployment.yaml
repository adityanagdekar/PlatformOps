apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: platformops
  labels:
    app.kubernetes.io/name: sample-api
    app.kubernetes.io/part-of: platformops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-api
        app.kubernetes.io/part-of: platformops
    spec:
      containers:
        - name: sample-api
          image: sample-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sample-api-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
